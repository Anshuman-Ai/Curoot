<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Curoot — Supplier Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0A10;
      --card: #141420;
      --card-border: rgba(64,73,68,0.3);
      --teal: #2DD4BF;
      --teal-dim: rgba(45,212,191,0.12);
      --accent: #8083FF;
      --red: #FF6B6B;
      --white: #FFFFFF;
      --white70: rgba(255,255,255,0.7);
      --white38: rgba(255,255,255,0.38);
      --white12: rgba(255,255,255,0.12);
      --font: 'Manrope', -apple-system, sans-serif;
    }
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--white); }
    body { display: flex; flex-direction: column; }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      padding: 20px 24px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--white12);
      background: linear-gradient(180deg, #141420 0%, var(--bg) 100%);
    }
    .header-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--teal-dim);
      border: 1px solid var(--teal);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-text h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
    .header-text p { font-size: 11px; color: var(--white38); margin-top: 2px; }

    /* ── Status bar ──────────────────────────────────────── */
    .status-bar {
      margin: 16px 16px 0; padding: 12px 14px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--card-border);
      display: flex; align-items: center; gap: 10px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(45,212,191,0.5);
    }
    .status-dot.valid { background: var(--teal); }
    .status-dot.invalid { background: var(--red); }
    .status-text { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; }

    /* ── Chat area ──────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { max-width: 85%; padding: 12px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .msg-meta { font-size: 9px; margin-bottom: 4px; font-weight: 700; letter-spacing: 0.6px; display: flex; justify-content: space-between; }
    .msg.oem { align-self: flex-start; background: #1E2A3A; border: 1px solid rgba(128,131,255,0.12); }
    .msg.oem .msg-meta { color: var(--accent); }
    .msg.supplier { align-self: flex-end; background: #1A2A2A; border: 1px solid rgba(45,212,191,0.12); }
    .msg.supplier .msg-meta { color: var(--teal); }
    .msg.system { align-self: center; background: #1A1E1A; border: 1px solid rgba(255,193,7,0.12); text-align: center; font-size: 12px; color: var(--white38); }
    .msg.system .msg-meta { color: #FFC107; justify-content: center; }
    .msg-content { color: var(--white70); }
    .msg .parsed-badge {
      margin-top: 8px; padding: 6px 10px;
      border-radius: 6px;
      background: var(--teal-dim);
      border: 1px solid rgba(45,212,191,0.15);
      font-size: 10px; font-weight: 600; color: var(--teal); letter-spacing: 0.3px;
    }

    /* ── Input bar ──────────────────────────────────────── */
    .input-bar {
      padding: 12px 16px 24px; display: flex; gap: 10px;
      border-top: 1px solid var(--white12);
      background: var(--card);
    }
    .input-bar input {
      flex: 1; padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: var(--bg);
      color: var(--white);
      font-family: var(--font); font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-bar input:focus { border-color: var(--teal); }
    .input-bar input::placeholder { color: var(--white38); }
    .input-bar button {
      width: 44px; height: 44px;
      border: none; border-radius: 10px;
      background: var(--teal);
      color: #000; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
    }
    .input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-bar button svg { width: 18px; height: 18px; }

    /* ── Error / loading states ──────────────────────────── */
    .error-screen, .loading-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 40px;
    }
    .error-screen h2 { color: var(--red); font-size: 18px; margin-bottom: 8px; }
    .error-screen p { color: var(--white38); font-size: 13px; line-height: 1.6; }
    .loading-screen .spinner {
      width: 24px; height: 24px;
      border: 2.5px solid var(--white12);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen p { margin-top: 12px; color: var(--white38); font-size: 12px; }

    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: var(--white38); font-size: 12px;
    }
    .empty-chat svg { width: 32px; height: 32px; opacity: 0.3; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');
    let token = '';
    let nodeId = '';
    let nodeName = '';
    let orgName = '';
    let sending = false;

    // ── Extract token from URL ─────────────────────────────────────────
    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    // ── API helpers ────────────────────────────────────────────────────
    const API = window.location.origin + '/api/v1';

    async function validateToken(tok) {
      const res = await fetch(`${API}/heartbeat/validate/${tok}`);
      if (!res.ok) throw new Error('Validation failed');
      return await res.json();
    }

    async function fetchHistory(nid) {
      const res = await fetch(`${API}/heartbeat/chat-history/${nid}?limit=100`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.messages || [];
    }

    async function sendMessage(tok, message) {
      const res = await fetch(`${window.location.origin}/supplier/chat/${tok}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      if (!res.ok) throw new Error('Send failed');
      return await res.json();
    }

    // ── Render functions ───────────────────────────────────────────────
    function renderLoading() {
      app.innerHTML = `
        <div class="header">
          <div class="header-icon">🔗</div>
          <div class="header-text">
            <h1>Curoot Supplier Portal</h1>
            <p>Validating your link…</p>
          </div>
        </div>
        <div class="loading-screen">
          <div class="spinner"></div>
          <p>Validating magic link…</p>
        </div>`;
    }

    function renderError(msg) {
      app.innerHTML = `
        <div class="header">
          <div class="header-icon" style="border-color:var(--red);background:rgba(255,107,107,0.1)">⚠️</div>
          <div class="header-text">
            <h1>Curoot Supplier Portal</h1>
            <p>Link validation failed</p>
          </div>
        </div>
        <div class="error-screen">
          <h2>Link Invalid</h2>
          <p>${msg}<br><br>Please request a new magic link from your supply chain partner.</p>
        </div>`;
    }

    function renderChat(messages) {
      const statusDot = `<div class="status-dot valid"></div>`;
      const chatHtml = messages.length === 0
        ? `<div class="empty-chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>No messages yet.<br>Send a status update below.</p>
           </div>`
        : messages.map(m => renderMessage(m)).join('');

      app.innerHTML = `
        <div class="header">
          <div class="header-icon">📦</div>
          <div class="header-text">
            <h1>${esc(nodeName)}</h1>
            <p>${esc(orgName)} — Supplier Portal</p>
          </div>
        </div>
        <div class="status-bar">
          ${statusDot}
          <span class="status-text" style="color:var(--teal)">CONNECTED</span>
          <span style="flex:1"></span>
          <span style="font-size:10px;color:var(--white38)">Token active</span>
        </div>
        <div class="chat-area" id="chatArea">${chatHtml}</div>
        <div class="input-bar">
          <input id="msgInput" placeholder="Type your status update…" autocomplete="off" />
          <button id="sendBtn" onclick="handleSend()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>`;

      // Scroll to bottom
      const chatArea = document.getElementById('chatArea');
      chatArea.scrollTop = chatArea.scrollHeight;

      // Enter key
      document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSend();
      });
    }

    function renderMessage(m) {
      const senderMap = { supplier: 'supplier', oem: 'oem', system: 'system' };
      const cls = senderMap[m.sender_type] || 'system';
      const labelMap = { supplier: 'YOU', oem: 'PARTNER', system: 'SYSTEM' };
      const label = labelMap[m.sender_type] || '🔔 PING';

      let timeStr = '';
      try {
        const dt = new Date(m.created_at);
        timeStr = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch (_) {}

      let parsedBadge = '';
      if (m.parsed_data && m.parsed_data.status) {
        const pd = m.parsed_data;
        let parts = [`✓ ${pd.status.toUpperCase()}`];
        if (pd.latency_hours) parts.push(`+${pd.latency_hours}h`);
        if (pd.reason) parts.push(pd.reason);
        parsedBadge = `<div class="parsed-badge">${esc(parts.join(' · '))}</div>`;
      }

      return `
        <div class="msg ${cls}">
          <div class="msg-meta">
            <span>${label}</span>
            <span style="color:var(--white38);font-weight:400">${timeStr}</span>
          </div>
          <div class="msg-content">${esc(m.content)}</div>
          ${parsedBadge}
        </div>`;
    }

    async function handleSend() {
      const input = document.getElementById('msgInput');
      const btn = document.getElementById('sendBtn');
      const text = input.value.trim();
      if (!text || sending) return;

      sending = true;
      btn.disabled = true;
      input.value = '';

      try {
        const result = await sendMessage(token, text);

        // Add supplier message to chat
        const chatArea = document.getElementById('chatArea');
        const emptyChat = chatArea.querySelector('.empty-chat');
        if (emptyChat) emptyChat.remove();

        chatArea.innerHTML += renderMessage({
          sender_type: 'supplier',
          content: text,
          created_at: new Date().toISOString(),
          parsed_data: result.parsed || {},
        });

        // Add system confirmation
        if (result.confirmation) {
          chatArea.innerHTML += renderMessage({
            sender_type: 'system',
            content: result.confirmation,
            created_at: new Date().toISOString(),
            parsed_data: {},
          });
        }

        chatArea.scrollTop = chatArea.scrollHeight;
      } catch (err) {
        console.error('Send failed:', err);
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML += `<div class="msg system"><div class="msg-meta">SYSTEM</div><div class="msg-content" style="color:var(--red)">Failed to send. Please try again.</div></div>`;
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      sending = false;
      btn.disabled = false;
      input.focus();
    }

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str || '';
      return el.innerHTML;
    }

    // ── Bootstrap ──────────────────────────────────────────────────────
    async function init() {
      renderLoading();
      token = getToken();

      if (!token) {
        renderError('No token found in the URL.');
        return;
      }

      try {
        const validation = await validateToken(token);
        if (!validation.valid) {
          renderError(validation.error || 'Token is invalid or expired.');
          return;
        }

        nodeId = validation.node_id;
        nodeName = validation.node_name || 'Supplier Node';
        orgName = validation.organization_name || 'Supply Chain Partner';

        // Fetch existing chat history
        const history = await fetchHistory(nodeId);
        renderChat(history);
      } catch (err) {
        console.error('Init failed:', err);
        renderError('Could not validate this link. It may have expired.');
      }
    }

    init();
  </script>
</body>
</html>
